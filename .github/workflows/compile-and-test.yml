name: Compile and test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install GCC 14
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14

      - uses: actions/checkout@v4

      - name: make test
        run: make test
